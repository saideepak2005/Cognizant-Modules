<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 4.1 - Sidebar and Content Layout</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <h1 class="mb-4">Two-Column Layout: Sidebar + Content</h1>
    <div class="row g-3">
      <div class="col-md-3">
        <div class="bg-dark text-white p-3 rounded">
          <h5 class="fw-bold">Sidebar</h5>
          <ul class="list-unstyled mt-3">
            <li class="mb-2"><a href="#" class="text-white text-decoration-none">Dashboard</a></li>
            <li class="mb-2"><a href="#" class="text-white text-decoration-none">Profile</a></li>
            <li class="mb-2"><a href="#" class="text-white text-decoration-none">Settings</a></li>
            <li class="mb-2"><a href="#" class="text-white text-decoration-none">Logout</a></li>
          </ul>
        </div>
      </div>
      <div class="col-md-9">
        <div class="bg-light p-4 rounded border">
          <h2>Main Content Area</h2>
          <p class="text-muted">This is the main content area using <code>col-md-9</code>. It takes up 9 out of 12 grid columns on medium and larger screens.</p>
          <div class="row g-2 mt-3">
            <div class="col-sm-6"><div class="card p-3 text-center bg-primary text-white">Widget 1</div></div>
            <div class="col-sm-6"><div class="card p-3 text-center bg-success text-white">Widget 2</div></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
