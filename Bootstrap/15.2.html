<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 15.2 - Shadows and Rounded Pills</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container mt-5">
    <h1 class="mb-4">Shadows, Rounded Pill Cards</h1>
    <div class="row g-4 justify-content-center">
      <div class="col-md-4">
        <div class="card shadow text-center p-4">
          <h5 class="card-title">shadow</h5>
          <p class="card-text text-muted">Basic shadow utility applied to this card.</p>
          <button class="btn btn-primary rounded-pill">rounded-pill Button</button>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card shadow-sm text-center p-4">
          <h5 class="card-title">shadow-sm</h5>
          <p class="card-text text-muted">Small shadow utility applied to this card.</p>
          <button class="btn btn-success rounded-pill">rounded-pill Button</button>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card shadow-lg text-center p-4">
          <h5 class="card-title">shadow-lg</h5>
          <p class="card-text text-muted">Large shadow utility applied to this card.</p>
          <button class="btn btn-danger rounded-pill">rounded-pill Button</button>
        </div>
      </div>
    </div>
    <hr class="my-4">
    <h4 class="mb-3">Rounded Utilities</h4>
    <div class="d-flex flex-wrap gap-3 align-items-center">
      <div class="bg-primary text-white p-3" style="width:80px;height:80px;display:flex;align-items:center;justify-content:center;">none</div>
      <div class="bg-primary text-white p-3 rounded" style="width:80px;height:80px;display:flex;align-items:center;justify-content:center;">rounded</div>
      <div class="bg-primary text-white p-3 rounded-3" style="width:80px;height:80px;display:flex;align-items:center;justify-content:center;">rounded-3</div>
      <div class="bg-primary text-white p-3 rounded-circle" style="width:80px;height:80px;display:flex;align-items:center;justify-content:center;">circle</div>
      <div class="bg-primary text-white px-4 py-3 rounded-pill">rounded-pill</div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
