<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 15.1 - Borders and Rounded Corners</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <h1 class="mb-4">Border Utilities</h1>
    <div class="row g-4 text-center">
      <div class="col-md-3">
        <img src="https://i.pravatar.cc/150?img=1" class="border border-primary border-3" alt="border-primary">
        <p class="mt-2 small">border border-primary border-3</p>
      </div>
      <div class="col-md-3">
        <img src="https://i.pravatar.cc/150?img=2" class="border border-success border-3 rounded" alt="rounded">
        <p class="mt-2 small">border-success + rounded</p>
      </div>
      <div class="col-md-3">
        <img src="https://i.pravatar.cc/150?img=3" class="border border-danger border-3 rounded-circle" alt="rounded-circle">
        <p class="mt-2 small">border-danger + rounded-circle</p>
      </div>
      <div class="col-md-3">
        <img src="https://i.pravatar.cc/150?img=4" class="border border-warning border-3 rounded-pill" alt="rounded-pill">
        <p class="mt-2 small">border-warning + rounded-pill</p>
      </div>
    </div>
    <hr class="my-4">
    <h4 class="mb-3">Border Placement</h4>
    <div class="d-flex flex-wrap gap-3">
      <div class="p-3 border">All borders</div>
      <div class="p-3 border-top border-primary">border-top</div>
      <div class="p-3 border-end border-success">border-end</div>
      <div class="p-3 border-bottom border-danger">border-bottom</div>
      <div class="p-3 border-start border-warning">border-start</div>
      <div class="p-3 border border-0">border-0 (none)</div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
