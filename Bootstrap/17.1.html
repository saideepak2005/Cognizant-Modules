<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 17.1 - Bootstrap Icons in Footer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <h1 class="mb-2">Bootstrap Icons Demo</h1>
    <p class="text-muted mb-4">Social media icons in the footer using Bootstrap Icons.</p>

    <h5>Common UI Icons</h5>
    <div class="d-flex flex-wrap gap-3 fs-4 mb-4">
      <i class="bi bi-house-fill text-primary" title="Home"></i>
      <i class="bi bi-person-circle text-success" title="User"></i>
      <i class="bi bi-envelope-fill text-danger" title="Email"></i>
      <i class="bi bi-bell-fill text-warning" title="Notifications"></i>
      <i class="bi bi-gear-fill text-secondary" title="Settings"></i>
      <i class="bi bi-search text-info" title="Search"></i>
      <i class="bi bi-cart-fill text-dark" title="Cart"></i>
    </div>
  </div>

  <footer class="bg-dark text-white mt-5 py-4">
    <div class="container text-center">
      <p class="mb-2">Follow us on social media</p>
      <div class="d-flex justify-content-center gap-4 fs-3">
        <a href="#" class="text-white"><i class="bi bi-facebook"></i></a>
        <a href="#" class="text-white"><i class="bi bi-twitter-x"></i></a>
        <a href="#" class="text-white"><i class="bi bi-instagram"></i></a>
        <a href="#" class="text-white"><i class="bi bi-linkedin"></i></a>
        <a href="#" class="text-white"><i class="bi bi-youtube"></i></a>
        <a href="#" class="text-white"><i class="bi bi-github"></i></a>
      </div>
      <p class="mt-3 mb-0 small text-muted">&copy; 2024 MyWebsite. All rights reserved.</p>
    </div>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
