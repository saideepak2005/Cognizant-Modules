<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 17.2 - Icon-Only Buttons</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <h1 class="mb-4">Icon-Only Buttons using Bootstrap Icons</h1>

    <h5 class="mb-3">Standard Icon Buttons</h5>
    <div class="d-flex flex-wrap gap-2 mb-4">
      <button class="btn btn-primary" title="Home"><i class="bi bi-house-fill"></i></button>
      <button class="btn btn-success" title="Add"><i class="bi bi-plus-circle-fill"></i></button>
      <button class="btn btn-danger" title="Delete"><i class="bi bi-trash-fill"></i></button>
      <button class="btn btn-warning" title="Edit"><i class="bi bi-pencil-fill"></i></button>
      <button class="btn btn-info text-white" title="Search"><i class="bi bi-search"></i></button>
      <button class="btn btn-secondary" title="Settings"><i class="bi bi-gear-fill"></i></button>
      <button class="btn btn-dark" title="Download"><i class="bi bi-download"></i></button>
      <button class="btn btn-outline-primary" title="Share"><i class="bi bi-share-fill"></i></button>
    </div>

    <h5 class="mb-3">Outline Icon Buttons</h5>
    <div class="d-flex flex-wrap gap-2 mb-4">
      <button class="btn btn-outline-danger" title="Like"><i class="bi bi-heart-fill"></i></button>
      <button class="btn btn-outline-warning" title="Star"><i class="bi bi-star-fill"></i></button>
      <button class="btn btn-outline-info" title="Info"><i class="bi bi-info-circle-fill"></i></button>
      <button class="btn btn-outline-success" title="Check"><i class="bi bi-check-circle-fill"></i></button>
    </div>

    <h5 class="mb-3">Sized Icon Buttons</h5>
    <div class="d-flex flex-wrap align-items-center gap-2 mb-4">
      <button class="btn btn-primary btn-lg" title="Large"><i class="bi bi-camera-fill fs-4"></i></button>
      <button class="btn btn-primary" title="Default"><i class="bi bi-camera-fill"></i></button>
      <button class="btn btn-primary btn-sm" title="Small"><i class="bi bi-camera-fill"></i></button>
    </div>

    <h5 class="mb-3">Icon Button Group (Toolbar)</h5>
    <div class="btn-group" role="toolbar">
      <button class="btn btn-secondary" title="Bold"><i class="bi bi-type-bold"></i></button>
      <button class="btn btn-secondary" title="Italic"><i class="bi bi-type-italic"></i></button>
      <button class="btn btn-secondary" title="Underline"><i class="bi bi-type-underline"></i></button>
      <button class="btn btn-secondary" title="Align Left"><i class="bi bi-text-left"></i></button>
      <button class="btn btn-secondary" title="Align Center"><i class="bi bi-text-center"></i></button>
      <button class="btn btn-secondary" title="Align Right"><i class="bi bi-text-right"></i></button>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
