<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 6.2 - Flexbox Card Layout</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <h1 class="mb-4">Flexbox Card Layout</h1>
    <p class="text-muted mb-4">Uses <code>justify-content-between</code> and <code>align-items-center</code> inside cards.</p>
    <div class="row g-4">
      <div class="col-md-4">
        <div class="card shadow-sm">
          <div class="card-body d-flex justify-content-between align-items-center">
            <div>
              <h6 class="card-title mb-1">Total Users</h6>
              <small class="text-muted">+12% this week</small>
            </div>
            <span class="fs-1 text-primary">👤</span>
          </div>
          <div class="card-footer d-flex justify-content-between align-items-center">
            <span class="fw-bold fs-5">4,280</span>
            <span class="badge bg-success">Active</span>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card shadow-sm">
          <div class="card-body d-flex justify-content-between align-items-center">
            <div>
              <h6 class="card-title mb-1">Revenue</h6>
              <small class="text-muted">+5% this month</small>
            </div>
            <span class="fs-1 text-success">💰</span>
          </div>
          <div class="card-footer d-flex justify-content-between align-items-center">
            <span class="fw-bold fs-5">$18,500</span>
            <span class="badge bg-primary">Growing</span>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card shadow-sm">
          <div class="card-body d-flex justify-content-between align-items-center">
            <div>
              <h6 class="card-title mb-1">Orders</h6>
              <small class="text-muted">-2% this week</small>
            </div>
            <span class="fs-1 text-warning">📦</span>
          </div>
          <div class="card-footer d-flex justify-content-between align-items-center">
            <span class="fw-bold fs-5">1,023</span>
            <span class="badge bg-warning text-dark">Review</span>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
