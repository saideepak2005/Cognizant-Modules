<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 12.1 - Spacing Utilities</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <h1 class="mb-4">Spacing Utilities - Margin and Padding</h1>

    <h5>Margin Utilities</h5>
    <div class="bg-primary text-white m-3 p-2 rounded">m-3 (margin all sides)</div>
    <div class="bg-success text-white mt-4 p-2 rounded">mt-4 (margin top)</div>
    <div class="bg-danger text-white ms-5 p-2 rounded">ms-5 (margin start/left)</div>
    <div class="bg-warning text-dark mx-auto p-2 rounded text-center" style="width:200px">mx-auto (centered)</div>

    <hr class="my-4">

    <h5>Padding Utilities</h5>
    <div class="bg-info text-white p-2 rounded mb-2">p-2 (padding all sides)</div>
    <div class="bg-secondary text-white py-5 px-2 rounded mb-2">py-5 px-2 (vertical 5, horizontal 2)</div>
    <div class="bg-dark text-white pt-3 pb-1 px-4 rounded mb-2">pt-3 pb-1 px-4</div>

    <hr class="my-4">

    <h5>Negative Margins (Bootstrap 5)</h5>
    <div class="bg-light border p-3 rounded">
      <div class="bg-primary text-white p-2 rounded mx-n2">mx-n2 (negative margin x)</div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
