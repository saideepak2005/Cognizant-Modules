<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 9.1 - Bootstrap Buttons</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <h1 class="mb-4">Bootstrap Button Classes</h1>
    <h5 class="mb-3">Solid Contextual Buttons</h5>
    <div class="d-flex flex-wrap gap-2 mb-4">
      <button class="btn btn-primary">btn-primary</button>
      <button class="btn btn-secondary">btn-secondary</button>
      <button class="btn btn-success">btn-success</button>
      <button class="btn btn-danger">btn-danger</button>
      <button class="btn btn-warning">btn-warning</button>
      <button class="btn btn-info">btn-info</button>
      <button class="btn btn-light">btn-light</button>
      <button class="btn btn-dark">btn-dark</button>
    </div>
    <h5 class="mb-3">Outline Buttons</h5>
    <div class="d-flex flex-wrap gap-2 mb-4">
      <button class="btn btn-outline-primary">outline-primary</button>
      <button class="btn btn-outline-secondary">outline-secondary</button>
      <button class="btn btn-outline-success">outline-success</button>
      <button class="btn btn-outline-danger">outline-danger</button>
      <button class="btn btn-outline-warning">outline-warning</button>
      <button class="btn btn-outline-dark">outline-dark</button>
    </div>
    <h5 class="mb-3">Sizes &amp; States</h5>
    <div class="d-flex flex-wrap align-items-center gap-2 mb-4">
      <button class="btn btn-primary btn-lg">Large</button>
      <button class="btn btn-primary">Default</button>
      <button class="btn btn-primary btn-sm">Small</button>
      <button class="btn btn-primary active">Active</button>
      <button class="btn btn-primary" disabled>Disabled</button>
    </div>
    <h5 class="mb-3">Full Width</h5>
    <div class="d-grid">
      <button class="btn btn-success">Full Width Button</button>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
