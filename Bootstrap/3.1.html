<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 3.1 - Responsive Grid Layout</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .box { background: #0d6efd; color: white; padding: 30px; text-align: center; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="container mt-5">
    <h1 class="mb-4">Responsive Grid - 3 Columns</h1>
    <p class="text-muted mb-4">Stacks vertically on mobile | 2 per row on tablet | 3 per row on desktop</p>
    <div class="row g-3">
      <div class="col-12 col-md-6 col-lg-4">
        <div class="box">Column 1</div>
      </div>
      <div class="col-12 col-md-6 col-lg-4">
        <div class="box">Column 2</div>
      </div>
      <div class="col-12 col-md-6 col-lg-4">
        <div class="box">Column 3</div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
