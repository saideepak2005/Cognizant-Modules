<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 6.1 - Flexbox Navbar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <nav class="bg-dark py-3 px-4">
    <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-md-between gap-3">
      <span class="text-white fw-bold fs-4">MyBrand</span>
      <ul class="d-flex flex-column flex-md-row list-unstyled mb-0 gap-2 gap-md-3">
        <li><a href="#" class="text-white text-decoration-none">Home</a></li>
        <li><a href="#" class="text-white text-decoration-none">About</a></li>
        <li><a href="#" class="text-white text-decoration-none">Services</a></li>
        <li><a href="#" class="text-white text-decoration-none">Contact</a></li>
      </ul>
      <button class="btn btn-primary btn-sm align-self-start align-self-md-center">Sign In</button>
    </div>
  </nav>

  <div class="container mt-5">
    <h1>Responsive Flexbox Navbar</h1>
    <p class="lead">Uses <code>d-flex</code>, <code>flex-column</code>, and <code>flex-md-row</code> for responsive behavior.</p>
    <div class="alert alert-info">Resize the browser to see the navbar stack vertically on small screens.</div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
