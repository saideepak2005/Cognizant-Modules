<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 3.2 - Container Row Col</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .col { background: #198754; color: white; padding: 20px; border: 2px solid #fff; text-align: center; }
    .container { border: 2px dashed #0d6efd; padding-top: 10px; }
    .row { background: #f8f9fa; border: 2px dashed #198754; }
  </style>
</head>
<body>
  <div class="container mt-5">
    <h1 class="mb-3">Container, Row, and Col-* Classes</h1>
    <div class="container my-4">
      <div class="row g-2 mb-3">
        <div class="col"><span>col</span></div>
        <div class="col"><span>col</span></div>
        <div class="col"><span>col</span></div>
      </div>
      <div class="row g-2 mb-3">
        <div class="col-6"><span>col-6</span></div>
        <div class="col-6"><span>col-6</span></div>
      </div>
      <div class="row g-2 mb-3">
        <div class="col-sm-4"><span>col-sm-4</span></div>
        <div class="col-sm-4"><span>col-sm-4</span></div>
        <div class="col-sm-4"><span>col-sm-4</span></div>
      </div>
      <div class="row g-2">
        <div class="col-md-3"><span>col-md-3</span></div>
        <div class="col-md-6"><span>col-md-6</span></div>
        <div class="col-md-3"><span>col-md-3</span></div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
