<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exercise 11 - Forms</title>
<link rel="stylesheet" href="11.css">
</head>
<body>
<header>
<h1>Local Community Event Portal</h1>
</header>
<main>
<h2>Register for an Event</h2>
<form id="reg-form">
<div class="form-group">
<label for="name">Name</label>
<input type="text" id="name" name="name">
<span class="error" id="name-err"></span>
</div>
<div class="form-group">
<label for="email">Email</label>
<input type="email" id="email" name="email">
<span class="error" id="email-err"></span>
</div>
<div class="form-group">
<label for="event">Select Event</label>
<select id="event" name="event">
<option value="">--Select--</option>
<option value="Music">Music Fest</option>
<option value="Tech">Tech Meetup</option>
</select>
<span class="error" id="event-err"></span>
</div>
<button type="submit" class="btn">Submit</button>
<div id="success-msg" class="success"></div>
</form>
</main>
<script src="11.js"></script>
</body>
</html>
