<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 5.1 - Justify and Align Content</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .demo-row { background: #e9ecef; min-height: 150px; border: 2px dashed #6c757d; border-radius: 8px; }
    .box { background: #0d6efd; color: white; padding: 20px 30px; border-radius: 6px; text-align: center; }
  </style>
</head>
<body>
  <div class="container mt-5">
    <h1 class="mb-5">Alignment Utilities in Grid</h1>

    <h4 class="mb-2">justify-content-center</h4>
    <div class="row justify-content-center demo-row align-items-center mb-4">
      <div class="col-md-3"><div class="box">Center 1</div></div>
      <div class="col-md-3"><div class="box">Center 2</div></div>
    </div>

    <h4 class="mb-2">justify-content-between + align-items-center</h4>
    <div class="row justify-content-between align-items-center demo-row mb-4 px-3">
      <div class="col-auto"><div class="box">Left</div></div>
      <div class="col-auto"><div class="box">Middle</div></div>
      <div class="col-auto"><div class="box">Right</div></div>
    </div>

    <h4 class="mb-2">justify-content-end + align-items-end</h4>
    <div class="row justify-content-end align-items-end demo-row px-3">
      <div class="col-auto"><div class="box">End 1</div></div>
      <div class="col-auto"><div class="box">End 2</div></div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
