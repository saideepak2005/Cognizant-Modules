<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 13.1 - Colors and Backgrounds</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container-fluid">
    <div class="bg-primary text-white p-4 text-center">
      <h4>bg-primary + text-white</h4>
    </div>
    <div class="bg-secondary text-white p-4 text-center">
      <h4>bg-secondary + text-white</h4>
    </div>
    <div class="bg-success text-white p-4 text-center">
      <h4>bg-success + text-white</h4>
    </div>
    <div class="bg-danger text-white p-4 text-center">
      <h4>bg-danger + text-white</h4>
    </div>
    <div class="bg-warning text-dark p-4 text-center">
      <h4>bg-warning + text-dark</h4>
    </div>
    <div class="bg-info text-white p-4 text-center">
      <h4>bg-info + text-white</h4>
    </div>
    <div class="bg-light text-dark p-4 text-center">
      <h4>bg-light + text-dark</h4>
    </div>
    <div class="bg-dark text-white p-4 text-center">
      <h4>bg-dark + text-white</h4>
    </div>
  </div>
  <div class="container mt-4 mb-5">
    <h3 class="mb-3">Text Color Utilities</h3>
    <div class="row g-3">
      <div class="col-md-4"><div class="p-3 border rounded"><span class="text-primary fw-bold">text-primary</span></div></div>
      <div class="col-md-4"><div class="p-3 border rounded"><span class="text-success fw-bold">text-success</span></div></div>
      <div class="col-md-4"><div class="p-3 border rounded"><span class="text-danger fw-bold">text-danger</span></div></div>
      <div class="col-md-4"><div class="p-3 border rounded"><span class="text-warning fw-bold">text-warning</span></div></div>
      <div class="col-md-4"><div class="p-3 border rounded"><span class="text-info fw-bold">text-info</span></div></div>
      <div class="col-md-4"><div class="p-3 border rounded"><span class="text-muted fw-bold">text-muted</span></div></div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
