<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 9.2 - Button Groups and Toggle Buttons</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <h1 class="mb-4">Button Groups and Toggle Buttons</h1>
    <h5 class="mb-2">Basic Button Group</h5>
    <div class="btn-group mb-4" role="group">
      <button type="button" class="btn btn-primary">Left</button>
      <button type="button" class="btn btn-primary">Middle</button>
      <button type="button" class="btn btn-primary">Right</button>
    </div>
    <h5 class="mb-2">Outlined Button Group</h5>
    <div class="btn-group mb-4" role="group">
      <button type="button" class="btn btn-outline-danger">Delete</button>
      <button type="button" class="btn btn-outline-warning">Archive</button>
      <button type="button" class="btn btn-outline-success">Save</button>
    </div>
    <h5 class="mb-2">Checkbox Toggle Buttons</h5>
    <div class="btn-group mb-4" role="group">
      <input type="checkbox" class="btn-check" id="btnCheck1" autocomplete="off">
      <label class="btn btn-outline-primary" for="btnCheck1">Option A</label>
      <input type="checkbox" class="btn-check" id="btnCheck2" autocomplete="off">
      <label class="btn btn-outline-primary" for="btnCheck2">Option B</label>
      <input type="checkbox" class="btn-check" id="btnCheck3" autocomplete="off">
      <label class="btn btn-outline-primary" for="btnCheck3">Option C</label>
    </div>
    <h5 class="mb-2">Radio Toggle Buttons</h5>
    <div class="btn-group mb-4" role="group">
      <input type="radio" class="btn-check" name="radioBtns" id="radio1" autocomplete="off" checked>
      <label class="btn btn-outline-success" for="radio1">Monthly</label>
      <input type="radio" class="btn-check" name="radioBtns" id="radio2" autocomplete="off">
      <label class="btn btn-outline-success" for="radio2">Yearly</label>
    </div>
    <h5 class="mb-2">Button Toolbar</h5>
    <div class="btn-toolbar gap-2">
      <div class="btn-group">
        <button class="btn btn-secondary">1</button>
        <button class="btn btn-secondary">2</button>
        <button class="btn btn-secondary">3</button>
      </div>
      <div class="btn-group">
        <button class="btn btn-secondary">4</button>
        <button class="btn btn-secondary">5</button>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
