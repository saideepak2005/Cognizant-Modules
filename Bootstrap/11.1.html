<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 11.1 - Profile Card</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container mt-5">
    <h1 class="mb-4 text-center">Profile Cards</h1>
    <div class="row justify-content-center g-4">
      <div class="col-md-4">
        <div class="card shadow text-center">
          <img src="https://i.pravatar.cc/300?img=3" class="card-img-top" alt="Profile Photo">
          <div class="card-body">
            <h5 class="card-title fw-bold">Alice Johnson</h5>
            <p class="card-text text-muted">Full Stack Developer at TechCorp. Passionate about building scalable web apps.</p>
            <span class="badge bg-success mb-2">Available for Hire</span>
            <div class="d-flex justify-content-center gap-2 mt-2">
              <button class="btn btn-primary btn-sm">Follow</button>
              <button class="btn btn-outline-secondary btn-sm">Message</button>
            </div>
          </div>
          <div class="card-footer text-muted small">Joined January 2022</div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card shadow text-center">
          <img src="https://i.pravatar.cc/300?img=8" class="card-img-top" alt="Profile Photo">
          <div class="card-body">
            <h5 class="card-title fw-bold">Bob Smith</h5>
            <p class="card-text text-muted">UI/UX Designer with 5+ years of experience in creating beautiful interfaces.</p>
            <span class="badge bg-primary mb-2">Open to Collaborate</span>
            <div class="d-flex justify-content-center gap-2 mt-2">
              <button class="btn btn-primary btn-sm">Follow</button>
              <button class="btn btn-outline-secondary btn-sm">Message</button>
            </div>
          </div>
          <div class="card-footer text-muted small">Joined March 2020</div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
