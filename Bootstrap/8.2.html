<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 8.2 - Login Form with Floating Labels</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark d-flex align-items-center" style="min-height:100vh;">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card bg-secondary text-white shadow-lg">
          <div class="card-body p-5">
            <h2 class="text-center mb-4 fw-bold">Login</h2>
            <form>
              <div class="form-floating mb-3">
                <input type="email" class="form-control bg-dark text-white border-secondary" id="floatEmail" placeholder="name@example.com">
                <label for="floatEmail" class="text-light">Email address</label>
              </div>
              <div class="form-floating mb-3">
                <input type="password" class="form-control bg-dark text-white border-secondary" id="floatPassword" placeholder="Password">
                <label for="floatPassword" class="text-light">Password</label>
              </div>
              <div class="form-floating mb-4">
                <select class="form-select bg-dark text-white border-secondary" id="floatRole">
                  <option selected>Select Role</option>
                  <option>Admin</option>
                  <option>User</option>
                  <option>Moderator</option>
                </select>
                <label for="floatRole" class="text-light">Role</label>
              </div>
              <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="rememberMe">
                <label class="form-check-label" for="rememberMe">Remember me</label>
              </div>
              <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Sign In</button>
              <p class="text-center mt-3 mb-0"><a href="#" class="text-info">Forgot password?</a></p>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
