<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 4.2 - Four Column Equal Layout</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .col-box { background: #6610f2; color: white; padding: 30px 10px; text-align: center; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="container mt-5">
    <h1 class="mb-4">Four-Column Equal Width Layout</h1>
    <p class="text-muted">Each column uses <code>col-sm-3</code> for equal width on small and above screens.</p>
    <div class="row g-3">
      <div class="col-sm-3">
        <div class="col-box"><h5>Column 1</h5><p class="mb-0 small">col-sm-3</p></div>
      </div>
      <div class="col-sm-3">
        <div class="col-box"><h5>Column 2</h5><p class="mb-0 small">col-sm-3</p></div>
      </div>
      <div class="col-sm-3">
        <div class="col-box"><h5>Column 3</h5><p class="mb-0 small">col-sm-3</p></div>
      </div>
      <div class="col-sm-3">
        <div class="col-box"><h5>Column 4</h5><p class="mb-0 small">col-sm-3</p></div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
