<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 5.2 - Column Reordering</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .box { padding: 30px; text-align: center; border-radius: 8px; color: white; }
  </style>
</head>
<body>
  <div class="container mt-5">
    <h1 class="mb-4">Column Reordering with order-md-*</h1>
    <p class="text-muted mb-4">On mobile: A, B, C order. On desktop: B, A, C order.</p>
    <div class="row g-3">
      <div class="col-12 col-md-4 order-md-2">
        <div class="box bg-primary">
          <h5>Column A</h5>
          <small>order-md-2 (appears 2nd on md+)</small>
        </div>
      </div>
      <div class="col-12 col-md-4 order-md-1">
        <div class="box bg-success">
          <h5>Column B</h5>
          <small>order-md-1 (appears 1st on md+)</small>
        </div>
      </div>
      <div class="col-12 col-md-4 order-md-3">
        <div class="box bg-danger">
          <h5>Column C</h5>
          <small>order-md-3 (appears 3rd on md+)</small>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
