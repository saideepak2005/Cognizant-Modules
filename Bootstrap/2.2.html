<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 2.2 - Bootstrap JS Bundle</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <h1 class="mb-4">Bootstrap JavaScript Plugins Demo</h1>
    <p class="lead">This page includes <code>bootstrap.bundle.min.js</code> which contains Popper.js.</p>

    <button type="button" class="btn btn-primary me-2" data-bs-toggle="modal" data-bs-target="#demoModal">Open Modal</button>

    <button type="button" class="btn btn-secondary" data-bs-toggle="tooltip" data-bs-placement="top" title="Tooltip works via JS bundle!">Hover for Tooltip</button>

    <div class="mt-4">
      <a class="btn btn-warning" data-bs-toggle="collapse" href="#collapseDemo">Toggle Collapse</a>
      <div class="collapse mt-2" id="collapseDemo">
        <div class="card card-body">Bootstrap JS plugins are working correctly via bundle!</div>
      </div>
    </div>

    <div class="modal fade" id="demoModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">JS Bundle Working!</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">bootstrap.bundle.min.js is successfully loaded.</div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    var tooltipEls = document.querySelectorAll('[data-bs-toggle="tooltip"]');
    tooltipEls.forEach(function(el) { new bootstrap.Tooltip(el); });
  </script>
</body>
</html>
